  <style>
    /* ── Product Detail Layout ── */
    :root { --ink: #1E1E1E; }
    .pd-page { background: var(--bg); min-height: 80vh; padding: 48px 0 80px; }

    .pd-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .pd-layout { grid-template-columns: 1fr; gap: 32px; }
    }

    /* Image Column */
    .pd-image-col { position: sticky; top: 100px; }
    .pd-image-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pd-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 24px;
    }

    /* Info Column */
    .pd-breadcrumb {
      font-size: 0.78rem;
      color: var(--text-light);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pd-breadcrumb a { color: var(--text-light); text-decoration: none; }
    .pd-breadcrumb a:hover { color: var(--green-dark); }
    .pd-breadcrumb span { color: var(--border); }

    .pd-category {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green-dark);
      margin: 0 0 10px;
    }
    .pd-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.1;
      margin: 0 0 20px;
    }
    .pd-description {
      font-size: 0.95rem;
      color: var(--text-mid);
      line-height: 1.75;
      margin: 0 0 32px;
    }

    /* CTA Buttons */
    .pd-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    /* Accordion */
    .pd-accordion { border-top: 1px solid var(--border); }
    .pd-accordion-item { border-bottom: 1px solid var(--border); }
    .pd-accordion-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      text-align: left;
    }
    .pd-accordion-trigger:hover { color: var(--green-dark); }
    .pd-accordion-trigger .acc-icon {
      font-size: 1.2rem;
      color: var(--text-light);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .pd-accordion-trigger.open .acc-icon { transform: rotate(45deg); color: var(--green-dark); }
    .pd-accordion-body {
      display: none;
      padding: 0 0 20px;
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.7;
    }
    .pd-accordion-body.open { display: block; }
    .pd-accordion-body p { margin: 0 0 10px; }

    /* Specs table inside accordion */
    .pd-specs { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .pd-specs td {
      padding: 8px 12px;
      font-size: 0.84rem;
      border-bottom: 1px solid var(--border);
    }
    .pd-specs td:first-child { font-weight: 600; color: var(--ink); width: 44%; }
    .pd-specs tr:last-child td { border-bottom: none; }

    /* Prev / Next Navigation */
    .pd-prevnext {
      border-top: 1px solid var(--border);
      margin-top: 64px;
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pd-prevnext a {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-decoration: none;
      color: var(--ink);
      transition: color 0.2s;
    }
    .pd-prevnext a:hover { color: var(--green-dark); }
    .pd-prevnext .pn-dir {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pd-prevnext .pn-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .pd-prevnext a:last-child { text-align: right; }
    .pd-prevnext a.hidden { visibility: hidden; }
  </style>

  // ── Accordion toggle ──
  function toggleAcc(btn) {
    const isOpen = btn.classList.contains('open');
    // Close all
    document.querySelectorAll('.pd-accordion-trigger').forEach(b => {
      b.classList.remove('open');
      b.nextElementSibling.classList.remove('open');
    });
    // If it was closed, open it
    if (!isOpen) {
      btn.classList.add('open');
      btn.nextElementSibling.classList.add('open');
    }
  }

  // ── Load product from URL param ──
  function loadProduct() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const idx = PRODUCTS.findIndex(p => p.id === id);

    if (idx === -1) {
      document.querySelector('.pd-page').innerHTML = '<div class="container" style="padding:80px 0;text-align:center;"><p>Product not found. <a href="products.html">Back to Products</a></p></div>';
      return;
    }

    const p = PRODUCTS[idx];

    // Update page title
    document.title = p.name + ' — Jehan Holding Group';

    // Image
    document.getElementById('pd-img').src = p.image;
    document.getElementById('pd-img').alt = p.name;

    // Breadcrumb
    document.getElementById('pd-breadcrumb-cat').textContent = p.category;
    document.getElementById('pd-breadcrumb-name').textContent = p.name;

    // Info
    document.getElementById('pd-cat').textContent = p.category;
    document.getElementById('pd-name').textContent = p.name;
    document.getElementById('pd-desc').textContent = p.description;

    // Specs table
    const specsHtml = p.specs.map(row =>
      `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`
    ).join('');
    document.getElementById('pd-specs').innerHTML = specsHtml;

    // Applications
    document.getElementById('pd-applications').textContent = p.applications;

    // FAQ
    const faqHtml = p.faq.map(item =>
      `<p><strong>${item.q}</strong><br>${item.a}</p>`
    ).join('');
    document.getElementById('pd-faq').innerHTML = faqHtml;

    // Prev / Next
    const prev = PRODUCTS[idx - 1];
    const next = PRODUCTS[idx + 1];

    const prevEl = document.getElementById('pd-prev');
    const nextEl = document.getElementById('pd-next');

    if (prev) {
      prevEl.href = 'product-detail.html?id=' + prev.id;
      document.getElementById('pd-prev-name').textContent = prev.name;
    } else {
      prevEl.classList.add('hidden');
    }

    if (next) {
      nextEl.href = 'product-detail.html?id=' + next.id;
      document.getElementById('pd-next-name').textContent = next.name;
    } else {
      nextEl.classList.add('hidden');
    }
  }

  loadProduct();
  </script>
