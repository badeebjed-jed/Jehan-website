<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - Jehan Holding Group</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary:      '#3D5A34',
          'primary-mid':'#5C7A48',
          'primary-lt': '#8CAE78',
          gold:         '#C49A1A',
          'gold-hover': '#A07D10',
          bg:           '#F2F1EE',
          surface:      '#FFFFFF',
          'surface-dim':'#F8F7F4',
          'surface-mid':'#EEEDE9',
          'surface-high':'#E4E3DF',
          dark:         '#1E1E1E',
          mid:          '#444444',
          light:        '#888888',
          border:       '#DCDBD7',
          error:        '#ba1a1a',
          'error-bg':   '#ffdad6',
          'gold-bg':    '#FBF0C4',
        },
        fontFamily: {
          heading: ['"Barlow Condensed"', 'Arial', 'sans-serif'],
          body:    ['Barlow', 'Arial', 'sans-serif'],
        },
        borderRadius: {
          DEFAULT: '4px',
          full: '9999px',
        },
      }
    }
  };
  </script>
  <style>
    body { font-family: 'Barlow', Arial, sans-serif; }
    h1,h2,h3,h4,h5 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 700; letter-spacing: 0.02em; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  </style>
</head>
<body class="bg-bg min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-4">
    <div class="flex justify-end mb-2">
      <button onclick="toggleDashLang()" id="dash-lang-btn" class="text-xs font-bold px-3 py-1 rounded border border-border text-mid hover:bg-surface-mid hover:text-primary transition-colors bg-surface">&#x0639;&#x0631;&#x0628;&#x064A;</button>
    </div>
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <img src="../assets/images/logo.png" class="h-24 object-contain" alt="Jehan Holding Group Logo"/>
    </div>

    <!-- Card -->
    <div class="bg-surface border border-border rounded shadow-[0_4px_20px_rgba(0,0,0,0.08)] p-10 max-w-md mx-auto">
      <!-- Heading -->
      <div class="text-center mb-8">
        <h1 class="font-heading text-4xl font-extrabold text-primary uppercase tracking-widest mb-2" data-i18n="login_heading">ACCESS</h1>
        <p class="text-sm text-light" data-i18n="login_sub">Authorized personnel only</p>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate class="space-y-5">
        <!-- Error banner -->
        <div id="loginError" class="hidden bg-error-bg border border-error/30 text-error text-sm font-semibold px-4 py-3 rounded">
          <span data-i18n="login_error_default">Invalid credentials. Access denied.</span>
        </div>

        <!-- Username/Email -->
        <div>
          <label class="block text-xs font-semibold text-mid mb-2 uppercase tracking-wide" data-i18n="lbl_username_l">Username / Email</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-light text-xl select-none">person</span>
            <input
              id="emailInput"
              type="email"
              autocomplete="username"
              required
              data-i18n-ph="ph_username" placeholder="Enter your username or email"
              class="w-full pl-10 pr-4 py-3 bg-surface-dim border border-border rounded text-sm text-dark placeholder-light focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-mid mb-2 uppercase tracking-wide" data-i18n="lbl_password">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-light text-xl select-none">lock</span>
            <input
              id="passwordInput"
              type="password"
              autocomplete="current-password"
              required
              data-i18n-ph="ph_password" placeholder="Enter your password"
              class="w-full pl-10 pr-12 py-3 bg-surface-dim border border-border rounded text-sm text-dark placeholder-light focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors"
            />
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-light hover:text-dark transition-colors focus:outline-none"
              tabindex="-1"
            >
              <span id="eyeIcon" class="material-symbols-outlined text-xl">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- Forgot Password -->
        <div class="text-right">
          <a href="#" class="text-sm font-semibold text-primary hover:underline" data-i18n="forgot_pw">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          id="loginBtn"
          type="submit"
          class="w-full bg-gold text-white font-semibold tracking-wide py-3 px-6 rounded hover:bg-gold-hover transition-colors uppercase mt-2 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <span id="loginBtnText" data-i18n="btn_login">LOGIN →</span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs font-semibold text-light mt-6 uppercase tracking-widest opacity-60">
      <span data-i18n="login_footer">Secure System Environment</span>
    </p>
  </div>

  <script src="js/auth.js?v=3"></script>
  <script>
    // If already logged in, skip the form.
    if (window.JehanAuth && window.JehanAuth.currentUser()) {
      window.location.replace('overview.html');
    }

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
      }
    }

    function showError(message) {
      const banner = document.getElementById('loginError');
      const span = banner.querySelector('span');
      if (message) span.textContent = message;
      banner.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('loginError').classList.add('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();

      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;

      if (!email.trim() || !password) {
        showError('Please enter both email and password.');
        return;
      }

      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const originalText = btnText.textContent;
      btn.disabled = true;
      btnText.textContent = 'Signing in…';

      try {
        const result = await window.JehanAuth.login(email, password);
        if (result.success) {
          window.location.replace('overview.html');
        } else {
          showError(result.error || 'Invalid credentials. Access denied.');
          btn.disabled = false;
          btnText.textContent = originalText;
          // Clear password on failure
          document.getElementById('passwordInput').value = '';
          document.getElementById('passwordInput').focus();
        }
      } catch (err) {
        showError('Login failed. Please try again.');
        btn.disabled = false;
        btnText.textContent = originalText;
      }
    });
  </script>
  <script src="js/dash-lang.js?v=3"></script>
</body>
</html>
