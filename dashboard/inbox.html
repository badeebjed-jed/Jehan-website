<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inbox - Jehan Holding Group</title>
  <!-- Auth guard: redirects to login if no valid session -->
  <script src="js/auth.js?v=12"></script>
  <script>if (!window.JehanAuth || !window.JehanAuth.requireAuth()) { /* halted by redirect */ }</script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary:      '#3D5A34',
          'primary-mid':'#5C7A48',
          'primary-lt': '#8CAE78',
          gold:         '#C49A1A',
          'gold-hover': '#A07D10',
          bg:           '#F2F1EE',
          surface:      '#FFFFFF',
          'surface-dim':'#F8F7F4',
          'surface-mid':'#EEEDE9',
          'surface-high':'#E4E3DF',
          dark:         '#1E1E1E',
          mid:          '#444444',
          light:        '#888888',
          border:       '#DCDBD7',
          error:        '#ba1a1a',
          'error-bg':   '#ffdad6',
          'gold-bg':    '#FBF0C4',
        },
        fontFamily: {
          heading: ['"Barlow Condensed"', 'Arial', 'sans-serif'],
          body:    ['Barlow', 'Arial', 'sans-serif'],
        },
        borderRadius: {
          DEFAULT: '4px',
          full: '9999px',
        },
      }
    }
  };
  </script>
  <style>
    body { font-family: 'Barlow', Arial, sans-serif; }
    h1,h2,h3,h4,h5 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 700; letter-spacing: 0.02em; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  </style>
</head>
<body class="bg-bg text-dark h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 h-full flex flex-col bg-surface border-r border-border flex-shrink-0" data-nav></aside>
  <script src="js/dash-nav.js?v=6"></script>

  <!-- Main: two-pane inbox layout -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Left Pane: Message List -->
    <div class="w-80 bg-surface border-r border-border flex flex-col flex-shrink-0">
      <div class="h-16 px-5 flex items-center justify-between border-b border-border flex-shrink-0">
        <h1 class="font-heading font-bold text-2xl uppercase tracking-wide text-dark" data-i18n="page_inbox">Inbox</h1>
        <span id="msg-unread-count" class="text-xs font-semibold text-light"></span>
      </div>
      <!-- Filter Tabs -->
      <div class="flex border-b border-border flex-shrink-0">
        <button id="tab-all" onclick="setMsgTab('all')" class="flex-1 py-3 text-sm font-semibold text-dark border-b-2 border-gold bg-surface-dim" data-i18n="tab_all">All</button>
        <button id="tab-unread" onclick="setMsgTab('unread')" class="flex-1 py-3 text-sm font-semibold text-light hover:bg-surface-mid transition-colors" data-i18n="tab_unread">Unread</button>
        <button id="tab-flagged" onclick="setMsgTab('flagged')" class="flex-1 py-3 text-sm font-semibold text-light hover:bg-surface-mid transition-colors" data-i18n="tab_flagged">Flagged</button>
      </div>
      <div id="msg-list" class="flex-1 overflow-y-auto divide-y divide-border"></div>
    </div>

    <!-- Right Pane: Message Detail -->
    <div id="msg-detail" class="flex-1 flex flex-col overflow-hidden bg-bg"></div>

  </div>

  <script src="js/dash-data.js?v=11"></script>
  <script>
    var D = window.JehanData;
    var msgTab = 'all';
    var selectedMsgId = null;

    function setMsgTab(tab) {
      msgTab = tab;
      ['all', 'unread', 'flagged'].forEach(function (t) {
        var b = document.getElementById('tab-' + t);
        if (t === tab) {
          b.classList.add('text-dark', 'border-b-2', 'border-gold', 'bg-surface-dim');
          b.classList.remove('text-light');
        } else {
          b.classList.remove('text-dark', 'border-b-2', 'border-gold', 'bg-surface-dim');
          b.classList.add('text-light');
        }
      });
      renderList();
    }

    function visibleMessages() {
      var all = D.getMessages();
      if (msgTab === 'unread') return all.filter(function (m) { return !m.read; });
      if (msgTab === 'flagged') return all.filter(function (m) { return m.flagged; });
      return all;
    }

    function renderList() {
      var list = document.getElementById('msg-list');
      var msgs = visibleMessages();
      var unread = D.unreadMessageCount();
      document.getElementById('msg-unread-count').textContent = unread ? unread + ' unread' : '';

      if (!msgs.length) {
        list.innerHTML = '<div class="flex flex-col items-center justify-center text-center py-16 px-5">' +
          '<div class="w-12 h-12 rounded-full bg-surface-dim flex items-center justify-center mb-3"><span class="material-symbols-outlined text-light text-2xl">mail</span></div>' +
          '<p class="text-sm font-semibold text-dark mb-1">No messages</p>' +
          '<p class="text-xs text-light">Messages from the website Contact form appear here.</p></div>';
        if (!D.getMessages().length) renderDetailEmpty();
        return;
      }

      list.innerHTML = msgs.map(function (m) {
        var active = m.id === selectedMsgId;
        return '<div onclick="selectMsg(' + m.id + ')" class="p-4 cursor-pointer transition-colors ' +
          (active ? 'bg-surface-dim border-l-4 border-gold' : 'bg-surface hover:bg-surface-dim') + '">' +
          '<div class="flex items-start justify-between gap-2 mb-1">' +
            '<div class="flex items-center gap-2 min-w-0">' +
              '<div class="w-8 h-8 rounded-full bg-gold-bg flex items-center justify-center flex-shrink-0"><span class="text-xs font-bold text-dark">' + D.initials(m.name) + '</span></div>' +
              '<span class="text-sm ' + (m.read ? 'text-mid' : 'font-semibold text-dark') + ' truncate">' + D.escapeHtml(m.name) + '</span>' +
            '</div>' +
            '<span class="text-xs text-light flex-shrink-0 flex items-center gap-1">' +
              (m.flagged ? '<span class="material-symbols-outlined text-gold text-[16px]">flag</span>' : '') +
              (m.read ? '' : '<span class="w-2 h-2 rounded-full bg-error"></span>') +
            '</span>' +
          '</div>' +
          '<p class="text-sm ' + (m.read ? 'text-light' : 'font-semibold text-dark') + ' mb-1 pl-10 truncate">' + D.escapeHtml(m.subject) + '</p>' +
          '<div class="pl-10"><span class="bg-gold-bg text-dark border border-gold text-xs font-semibold px-2 py-0.5 rounded-full">' + D.escapeHtml(m.source) + '</span></div>' +
        '</div>';
      }).join('');
      if (window.reapplyDashLang) { try { window.reapplyDashLang(); } catch (e) {} }
    }

    function renderDetailEmpty() {
      document.getElementById('msg-detail').innerHTML =
        '<div class="flex-1 flex flex-col items-center justify-center text-center p-8">' +
          '<div class="w-16 h-16 rounded-full bg-surface-dim flex items-center justify-center mb-4"><span class="material-symbols-outlined text-light text-4xl">drafts</span></div>' +
          '<p class="font-heading text-xl font-bold text-dark mb-1">No message selected</p>' +
          '<p class="text-sm text-light max-w-sm">Select a message on the left to read it. New messages arrive automatically when visitors use the Contact form.</p>' +
        '</div>';
    }

    function selectMsg(id) {
      selectedMsgId = id;
      var m = D.getMessages().filter(function (x) { return x.id === id; })[0];
      if (!m) return;
      if (!m.read) { D.updateMessage(id, { read: true }); D.syncInboxBadge(); }
      renderList();
      renderDetail(D.getMessages().filter(function (x) { return x.id === id; })[0]);
    }

    function renderDetail(m) {
      document.getElementById('msg-detail').innerHTML =
        '<div class="px-8 py-5 bg-surface border-b border-border flex-shrink-0">' +
          '<div class="flex items-start justify-between gap-4">' +
            '<div class="flex-1 min-w-0">' +
              '<h2 class="font-heading text-xl font-bold text-dark mb-2">' + D.escapeHtml(m.subject) + '</h2>' +
              '<div class="flex items-center gap-3 flex-wrap">' +
                '<div class="w-8 h-8 rounded-full bg-gold-bg flex items-center justify-center flex-shrink-0"><span class="text-xs font-bold text-dark">' + D.initials(m.name) + '</span></div>' +
                '<div class="text-sm"><span class="font-semibold text-dark">' + D.escapeHtml(m.name) + '</span>' +
                  (m.email ? '<span class="text-light mx-2">·</span><a href="mailto:' + D.escapeHtml(m.email) + '" class="text-primary hover:underline">' + D.escapeHtml(m.email) + '</a>' : '') +
                  '<span class="text-light mx-2">·</span><span class="text-light">' + D.fmtRelative(m.date) + '</span></div>' +
              '</div>' +
            '</div>' +
            '<div class="flex items-center gap-2 flex-shrink-0">' +
              '<span class="bg-gold-bg text-dark border border-gold text-xs font-semibold px-2 py-1 rounded-full">' + D.escapeHtml(m.source) + '</span>' +
              '<button onclick="toggleFlag(' + m.id + ')" class="p-2 rounded hover:bg-surface-mid transition-colors" title="Flag"><span class="material-symbols-outlined ' + (m.flagged ? 'text-gold' : 'text-light') + ' text-xl">flag</span></button>' +
              '<button onclick="deleteMsg(' + m.id + ')" class="p-2 rounded hover:bg-error-bg hover:text-error transition-colors" title="Delete"><span class="material-symbols-outlined text-light text-xl">delete</span></button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="flex-1 overflow-y-auto px-8 py-6"><div class="max-w-3xl text-sm text-dark leading-relaxed whitespace-pre-wrap">' + D.escapeHtml(m.body || '(No message body)') + '</div></div>' +
        '<div class="px-8 py-5 bg-surface border-t border-border flex-shrink-0">' +
          '<div class="border border-border rounded overflow-hidden">' +
            '<textarea id="reply-box" rows="3" data-i18n-ph="ph_reply" placeholder="Write a reply…" class="w-full px-4 py-3 bg-surface text-sm text-dark placeholder-light focus:outline-none resize-none"></textarea>' +
            '<div class="flex items-center justify-end px-4 py-3 bg-surface-dim border-t border-border">' +
              '<button onclick="sendReply(' + m.id + ')" class="flex items-center gap-2 bg-gold text-white font-semibold tracking-wide px-5 py-2 rounded hover:bg-gold-hover transition-colors text-sm">' +
                '<span class="material-symbols-outlined text-lg">send</span><span data-i18n="btn_send_reply">Send Reply</span></button>' +
            '</div>' +
          '</div>' +
        '</div>';
      if (window.reapplyDashLang) { try { window.reapplyDashLang(); } catch (e) {} }
    }

    function toggleFlag(id) {
      var m = D.getMessages().filter(function (x) { return x.id === id; })[0];
      if (!m) return;
      D.updateMessage(id, { flagged: !m.flagged });
      renderList();
      renderDetail(D.getMessages().filter(function (x) { return x.id === id; })[0]);
    }
    function deleteMsg(id) {
      var all = D.getMessages().filter(function (x) { return x.id !== id; });
      localStorage.setItem('jehan_messages', JSON.stringify(all));
      selectedMsgId = null;
      D.syncInboxBadge();
      renderList();
      var next = visibleMessages()[0];
      if (next) selectMsg(next.id); else renderDetailEmpty();
    }
    function sendReply(id) {
      var box = document.getElementById('reply-box');
      if (box && box.value.trim()) {
        box.value = '';
        var t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#3D5A34;color:#fff;padding:10px 20px;border-radius:4px;font-size:.8rem;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);';
        t.textContent = 'Reply sent';
        document.body.appendChild(t);
        setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 2500);
      }
    }

    // Initial render — auto-select newest message if any
    setMsgTab('all');
    (function () {
      var first = D.getMessages()[0];
      if (first) selectMsg(first.id); else renderDetailEmpty();
    })();
    // Re-render the list when new messages arrive from the server.
    D.subscribe(function () {
      renderList();
      if (selectedMsgId == null) {
        var first = D.getMessages()[0];
        if (first) selectMsg(first.id);
      }
    });
  </script>

  <script src="js/dash-lang.js?v=13"></script>
  <script>
    // ── Company Profile Upload ────────────────────────────────────
    function uploadProfile(input) {
      if (!input.files || !input.files[0]) return;
      var file = input.files[0];
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          localStorage.setItem("jehan_profile_data", e.target.result);
          var now = new Date();
          var dateStr = now.toLocaleDateString("en-GB", {day:"2-digit",month:"short",year:"numeric"});
          localStorage.setItem("jehan_profile_date", dateStr);
          updateProfileDateUI();
          var lang = localStorage.getItem("dashLang") || "en";
          var msg = lang === "ar" ? "تم تحديث ملف الشركة بنجاح!" : "Company profile updated successfully!";
          var t = document.createElement("div");
          t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3D5A34;color:#fff;padding:10px 20px;border-radius:4px;font-size:.8rem;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);white-space:nowrap;";
          t.textContent = msg;
          document.body.appendChild(t);
          setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3000);
        } catch(err) { alert("File too large. Please use a PDF under 4MB."); }
      };
      reader.readAsDataURL(file);
    }
    function updateProfileDateUI() {
      var el = document.getElementById("profile-date");
      if (!el) return;
      var date = localStorage.getItem("jehan_profile_date");
      var lang = localStorage.getItem("dashLang") || "en";
      el.textContent = date
        ? (lang === "ar" ? "آخر تحديث: " + date : "Last updated: " + date)
        : (lang === "ar" ? "لم يتم رفع ملف بعد" : "No profile uploaded yet");
    }
    (function() {
      var _orig = window.toggleDashLang;
      if (_orig) { window.toggleDashLang = function() { _orig(); setTimeout(updateProfileDateUI, 60); }; }
    })();
    updateProfileDateUI();
  </script>
</body>
</html>
