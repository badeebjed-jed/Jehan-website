<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Database - Jehan Holding Group</title>
  <!-- Auth guard: redirects to login if no valid session -->
  <script src="js/auth.js?v=10"></script>
  <script>if (!window.JehanAuth || !window.JehanAuth.enforce('customers')) { /* halted by redirect */ }</script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary:      '#3D5A34',
          'primary-mid':'#5C7A48',
          'primary-lt': '#8CAE78',
          gold:         '#C49A1A',
          'gold-hover': '#A07D10',
          bg:           '#F2F1EE',
          surface:      '#FFFFFF',
          'surface-dim':'#F8F7F4',
          'surface-mid':'#EEEDE9',
          'surface-high':'#E4E3DF',
          dark:         '#1E1E1E',
          mid:          '#444444',
          light:        '#888888',
          border:       '#DCDBD7',
          error:        '#ba1a1a',
          'error-bg':   '#ffdad6',
          'gold-bg':    '#FBF0C4',
        },
        fontFamily: {
          heading: ['"Barlow Condensed"', 'Arial', 'sans-serif'],
          body:    ['Barlow', 'Arial', 'sans-serif'],
        },
        borderRadius: {
          DEFAULT: '4px',
          full: '9999px',
        },
      }
    }
  };
  </script>
  <style>
    body { font-family: 'Barlow', Arial, sans-serif; }
    h1,h2,h3,h4,h5 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 700; letter-spacing: 0.02em; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .action-col { visibility: hidden; }
    tr:hover .action-col { visibility: visible; }
  </style>
</head>
<body class="bg-bg text-dark h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 h-full flex flex-col bg-surface border-r border-border flex-shrink-0" data-nav></aside>
  <script src="js/dash-nav.js?v=3"></script>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-surface border-b border-border h-16 flex items-center gap-4 px-8 flex-shrink-0">
      <h1 class="font-heading font-bold text-2xl uppercase tracking-wide text-dark flex-1" data-i18n="page_customers">Customer Database</h1>
      <button onclick="exportCSV()" class="flex items-center gap-2 px-4 py-2 border border-primary text-primary rounded text-sm font-semibold hover:bg-primary hover:text-white transition-colors">
        <span class="material-symbols-outlined text-[20px]">download</span>
        <span data-i18n="btn_export">Export CSV</span>
      </button>
      <button onclick="openAddRecord()" class="flex items-center gap-2 px-4 py-2 bg-gold text-white rounded text-sm font-semibold hover:bg-gold-hover transition-colors">
        <span class="material-symbols-outlined text-[20px]">add</span>
        <span data-i18n="btn_add_record">Add Record →</span>
      </button>
    </header>

    <!-- Controls Bar -->
    <div class="px-8 py-4 bg-surface border-b border-border flex items-center gap-4 flex-shrink-0">
      <div class="relative w-96">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-light text-[20px]">search</span>
        <input id="cust-search" type="text" oninput="renderCustomers()" data-i18n-ph="ph_search_cust" placeholder="Search customers…" class="w-full pl-10 pr-4 py-2 border border-border rounded bg-bg text-sm text-dark placeholder-light focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"/>
      </div>
      <select id="cust-segment-filter" onchange="renderCustomers()" class="px-3 py-2 border border-border rounded text-sm font-semibold text-mid bg-surface focus:outline-none focus:border-primary">
        <option value="" data-i18n="flt_all_segments">All Segments</option>
        <option value="contractor" data-i18n="seg_contractor">Contractor</option>
        <option value="consultant" data-i18n="seg_consultant">Consultant</option>
        <option value="walk-in" data-i18n="seg_walkin">Walk-in</option>
        <option value="government" data-i18n="seg_government">Government</option>
        <option value="retail" data-i18n="seg_retail">Retail</option>
        <option value="developer" data-i18n="seg_developer">Developer</option>
      </select>
      <label class="flex items-center gap-2 text-sm font-semibold text-mid cursor-pointer">
        <input id="cust-key-filter" type="checkbox" onchange="renderCustomers()" class="rounded border-border text-gold focus:ring-gold"/>
        <span class="material-symbols-outlined text-gold text-[18px]">star</span>
        <span data-i18n="cust_key">Key Account</span>
      </label>
    </div>

    <!-- Table -->
    <main class="flex-1 overflow-y-auto">
      <div class="bg-surface">
        <table class="w-full">
          <thead class="bg-surface-dim border-b border-border sticky top-0">
            <tr>
              <th class="px-6 py-3 w-10">
                <input type="checkbox" class="rounded border-border text-primary focus:ring-primary"/>
              </th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-light uppercase tracking-wide" data-i18n="th_cust_name">Customer Name</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-light uppercase tracking-wide" data-i18n="th_email">Email</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-light uppercase tracking-wide" data-i18n="th_phone">Phone</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-light uppercase tracking-wide" data-i18n="th_last_activity">Last Activity</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-light uppercase tracking-wide" data-i18n="th_location_c">Location</th>

  <div id="add-record-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:51;width:100%;max-width:520px;background:#fff;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.18);overflow:hidden;">

      <button onclick="closeAddRecord()" style="background:none;border:none;cursor:pointer;color:#888;padding:4px;" title="Close">
        <span class="material-symbols-outlined" style="font-size:22px;">close</span>
      </button>
    </div>
    <div style="padding:24px;display:flex;flex-direction:column;gap:16px;max-height:70vh;overflow-y:auto;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

        </div>
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:600;color:#444;margin-bottom:6px;">Phone</label>
          <input id="rec-phone" type="tel" placeholder="+966 5X XXX XXXX" style="width:100%;padding:9px 12px;border:1px solid #DCDBD7;border-radius:4px;font-size:0.875rem;color:#1E1E1E;background:#F2F1EE;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#3D5A34'" onblur="this.style.borderColor='#DCDBD7'"/>
        </div>
      </div>
      <div>
        <label style="display:block;font-size:0.75rem;font-weight:600;color:#444;margin-bottom:6px;">Email <span style="color:#ba1a1a;">*</span></label>
        <input id="rec-email" type="email" placeholder="name@company.com" style="width:100%;padding:9px 12px;border:1px solid #DCDBD7;border-radius:4px;font-size:0.875rem;color:#1E1E1E;background:#F2F1EE;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#3D5A34'" onblur="this.style.borderColor='#DCDBD7'"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:600;color:#444;margin-bottom:6px;">Location</label>
          <input id="rec-location" type="text" placeholder="e.g. Riyadh, SA" style="width:100%;padding:9px 12px;border:1px solid #DCDBD7;border-radius:4px;font-size:0.875rem;color:#1E1E1E;background:#F2F1EE;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#3D5A34'" onblur="this.style.borderColor='#DCDBD7'"/>
        </div>
        <div>
          <label style="display:block;font-size:0.75rem;font-weight:600;color:#444;margin-bottom:6px;">Last Activity</label>
          <select id="rec-activity" style="width:100%;padding:9px 12px;border:1px solid #DCDBD7;border-radius:4px;font-size:0.875rem;color:#1E1E1E;background:#F2F1EE;outline:none;box-sizing:border-box;">
            <option value="Booked Concrete">Booked Concrete</option>
            <option value="Used Calculator">Used Calculator</option>
            <option value="Supply Request">Supply Request</option>
            <option value="Downloaded Specs">Downloaded Specs</option>
            <option value="Enquiry">Enquiry</option>

        </div>
      </div>
      <div>
        <label style="display:block;font-size:0.75rem;font-weight:600;color:#444;margin-bottom:6px;">Notes</label>
        <textarea id="rec-notes" rows="3" placeholder="Optional internal notes…" style="width:100%;padding:9px 12px;border:1px solid #DCDBD7;border-radius:4px;font-size:0.875rem;color:#1E1E1E;background:#F2F1EE;outline:none;resize:vertical;box-sizing:border-box;" onfocus="this.style.borderColor='#3D5A34'" onblur="this.style.borderColor='#DCDBD7'"></textarea>

    </div>
    <div style="padding:16px 24px;border-top:1px solid #DCDBD7;display:flex;gap:12px;justify-content:flex-end;">
      <button onclick="closeAddRecord()" style="padding:9px 20px;border:1px solid #DCDBD7;background:none;border-radius:4px;font-size:0.875rem;font-weight:600;color:#444;cursor:pointer;">Cancel</button>

    </div>
  </div>
  <div id="rec-toast" style="display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#3D5A34;color:#fff;font-weight:600;font-size:0.875rem;padding:12px 24px;border-radius:6px;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,0.18);">Customer record added successfully!</div>

  <script src="js/dash-lang.js?v=9"></script>
  <script>
    // ── Company Profile Upload ────────────────────────────────────
    function uploadProfile(input) {
      if (!input.files || !input.files[0]) return;
      var file = input.files[0];
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          localStorage.setItem("jehan_profile_data", e.target.result);
          var now = new Date();
          var dateStr = now.toLocaleDateString("en-GB", {day:"2-digit",month:"short",year:"numeric"});
          localStorage.setItem("jehan_profile_date", dateStr);
          updateProfileDateUI();
          var lang = localStorage.getItem("dashLang") || "en";
          var msg = lang === "ar" ? "تم تحديث ملف الشركة بنجاح!" : "Company profile updated successfully!";
          var t = document.createElement("div");
          t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3D5A34;color:#fff;padding:10px 20px;border-radius:4px;font-size:.8rem;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);white-space:nowrap;";
          t.textContent = msg;
          document.body.appendChild(t);
          setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3000);
        } catch(err) { alert("File too large. Please use a PDF under 4MB."); }
      };
      reader.readAsDataURL(file);
    }
    function updateProfileDateUI() {
      var el = document.getElementById("profile-date");
      if (!el) return;
      var date = localStorage.getItem("jehan_profile_date");
      var lang = localStorage.getItem("dashLang") || "en";
      el.textContent = date
        ? (lang === "ar" ? "آخر تحديث: " + date : "Last updated: " + date)
        : (lang === "ar" ? "لم يتم رفع ملف بعد" : "No profile uploaded yet");
    }
    (function() {
      var _orig = window.toggleDashLang;
      if (_orig) { window.toggleDashLang = function() { _orig(); setTimeout(updateProfileDateUI, 60); }; }
    })();
    updateProfileDateUI();
  </script>
  <script src="js/dash-data.js?v=8"></script>
  <script>
    var D = window.JehanData;

    function activityPill(activity) {
      switch (activity) {
        case 'Booked Concrete': return 'bg-primary-lt/30 text-primary border border-primary-lt';
        case 'Supply Request':  return 'bg-gold-bg text-dark border border-gold';
        default:                return 'bg-surface-mid text-mid border border-border';
      }
    }

    var SEG_I18N = { 'contractor':'seg_contractor','consultant':'seg_consultant','walk-in':'seg_walkin',
      'government':'seg_government','retail':'seg_retail','developer':'seg_developer' };
    function segPill(c) {
      if (!c.segment) return '';
      return '<span class="inline-block bg-surface-mid text-mid border border-border text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide" data-i18n="' + (SEG_I18N[c.segment] || '') + '">' + D.escapeHtml(c.segment) + '</span>';
    }
    function keyStar(c) {
      return c.keyAccount ? '<span class="material-symbols-outlined text-gold text-[16px]" style="font-variation-settings:\'FILL\' 1" title="Key Account">star</span>' : '';
    }
    function renderCustomers() {
      var all = D.getCustomers();
      var q = (document.getElementById('cust-search').value || '').trim().toLowerCase();
      var seg = document.getElementById('cust-segment-filter').value;
      var keyOnly = document.getElementById('cust-key-filter').checked;
      var rows = all.filter(function (c) {
        if (seg && c.segment !== seg) return false;
        if (keyOnly && !c.keyAccount) return false;
        if (!q) return true;
        return [c.name, c.company, c.email, c.phone, c.location, c.activity, c.representative].join(' ').toLowerCase().indexOf(q) !== -1;
      });
      var tbody = document.getElementById('cust-tbody');
      var count = document.getElementById('cust-count');

      if (!all.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-20 text-center">' +
          '<div class="flex flex-col items-center justify-center">' +
            '<div class="w-14 h-14 rounded-full bg-surface-dim flex items-center justify-center mb-3"><span class="material-symbols-outlined text-light text-3xl">group</span></div>' +
            '<p class="font-heading text-lg font-bold text-dark mb-1">No customers yet</p>' +
            '<p class="text-sm text-light max-w-sm">Add a record manually, or use “Add to Customers” on a quote request to build your database.</p>' +
          '</div></td></tr>';
        count.textContent = 'No customers yet';
        return;
      }
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-16 text-center text-sm text-light">No customers match “' + D.escapeHtml(q) + '”.</td></tr>';
        count.textContent = 'Showing 0 of ' + all.length;
        return;
      }

      tbody.innerHTML = rows.map(function (c) {
        return '<tr class="bg-surface hover:bg-surface-dim transition-colors group cursor-pointer" onclick="openProfile(' + c.id + ')">' +
          '<td class="px-6 py-4" onclick="event.stopPropagation()"><input type="checkbox" class="rounded border-border text-primary focus:ring-primary"/></td>' +
          '<td class="px-4 py-4"><div class="flex items-center gap-3">' +
            '<div class="w-9 h-9 rounded-full bg-primary-lt/30 text-primary flex items-center justify-center flex-shrink-0"><span class="text-xs font-bold">' + D.initials(c.name) + '</span></div>' +
            '<div><div class="flex items-center gap-1.5"><span class="text-sm font-semibold text-dark">' + D.escapeHtml(c.name) + '</span>' + keyStar(c) + '</div>' +
            '<div class="flex items-center gap-1.5 mt-0.5">' + (c.company ? '<span class="text-xs text-light">' + D.escapeHtml(c.company) + '</span>' : '') + segPill(c) + '</div></div></div></td>' +
          '<td class="px-4 py-4 text-sm text-light">' + (c.email ? D.escapeHtml(c.email) : '—') +
            (c.representative ? '<p class="text-[11px] text-light mt-0.5"><span class="material-symbols-outlined text-[12px] align-middle">badge</span> ' + D.escapeHtml(c.representative) + '</p>' : '') + '</td>' +
          '<td class="px-4 py-4 text-sm text-light">' + (c.phone ? D.escapeHtml(c.phone) : '—') + '</td>' +
          '<td class="px-4 py-4"><span class="' + activityPill(c.activity) + ' text-xs font-semibold px-3 py-1 rounded-full">' + D.escapeHtml(c.activity) + '</span></td>' +
          '<td class="px-4 py-4 text-sm text-light">' + (c.location ? D.escapeHtml(c.location) : '—') + '</td>' +
          '<td class="px-4 py-4 text-sm text-light whitespace-nowrap">' + D.fmtDate(c.date) + '</td>' +
        '</tr>';
      }).join('');
      count.innerHTML = 'Showing <span class="font-semibold text-dark">' + rows.length + '</span> of ' + all.length + ' customer' + (all.length === 1 ? '' : 's');
      if (window.reapplyDashLang) { try { window.reapplyDashLang(); } catch (e) {} }
    }

    function openAddRecord() {
      document.getElementById('add-record-modal').style.display = 'block';
      document.getElementById('add-record-overlay').style.display = 'block';
      document.body.style.overflow = 'hidden';
      document.getElementById('rec-name').focus();
    }
    function closeAddRecord() {
      document.getElementById('add-record-modal').style.display = 'none';
      document.getElementById('add-record-overlay').style.display = 'none';
      document.body.style.overflow = '';
    }
    function saveNewRecord() {
      var name = document.getElementById('rec-name').value.trim();
      var email = document.getElementById('rec-email').value.trim();
      if (!name || !email) { alert('Please fill in Name and Email.'); return; }
      D.addCustomer({
        name: name,
        email: email,
        phone: document.getElementById('rec-phone').value.trim(),
        location: document.getElementById('rec-location').value.trim(),
        activity: document.getElementById('rec-activity').value,
        notes: document.getElementById('rec-notes').value.trim()
      });
      closeAddRecord();
      ['rec-name','rec-email','rec-phone','rec-location','rec-notes'].forEach(function (id) { document.getElementById(id).value = ''; });
      renderCustomers();
      var toast = document.getElementById('rec-toast');
      toast.style.display = 'block';
      setTimeout(function () { toast.style.display = 'none'; }, 3000);
    }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeAddRecord(); });

    function exportCSV() {
      var all = D.getCustomers();
      if (!all.length) { alert('There are no customers to export yet.'); return; }
      var headers = ['Customer Name', 'Email', 'Phone', 'Last Activity', 'Location', 'Date Added'];
      var rows = all.map(function (c) {
        return [c.name, c.email, c.phone, c.activity, c.location, D.fmtDate(c.date)].map(function (v) {
          return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
        }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\r\n');
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'jehan-customers.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── Customer profile drawer ────────────────────────────────
    var profileId = null;
    var TIMELINE_ICON = { request: 'list_alt', quote: 'request_quote', message: 'mail', task: 'task_alt' };
    function openProfile(id) {
      var c = D.getCustomer(id); if (!c) return;
      profileId = id;
      document.getElementById('pf-initials').textContent = D.initials(c.name);
      document.getElementById('pf-title').textContent = c.name;
      document.getElementById('pf-star').classList.toggle('hidden', !c.keyAccount);
      document.getElementById('pf-name').value = c.name || '';
      document.getElementById('pf-company').value = c.company || '';
      document.getElementById('pf-email').value = c.email || '';
      document.getElementById('pf-phone').value = c.phone || '';
      document.getElementById('pf-location').value = c.location || '';
      document.getElementById('pf-segment').value = c.segment || '';
      document.getElementById('pf-rep').value = c.representative || '';
      document.getElementById('pf-key').checked = !!c.keyAccount;
      document.getElementById('pf-notes').value = c.notes || '';

      // Sales history stats from matched requests
      var em = (c.email || '').trim().toLowerCase();
      var ph = String(c.phone || '').replace(/\D/g, '');
      var matched = D.getRequests().filter(function (r) {
        var rEm = (r.email || '').trim().toLowerCase();
        var rPh = String(r.phone || '').replace(/\D/g, '');
        return (em && rEm === em) || (ph && rPh === ph);
      });
      var quoted = matched.filter(function (r) { return r.quote; }).length;
      var booked = matched.filter(function (r) { return ['Booked', 'Paid', 'Approved'].indexOf(r.status) !== -1; }).length;
      var vol = matched.reduce(function (s, r) { var q = parseFloat(r.quantity); return s + (isNaN(q) ? 0 : q); }, 0);
      document.getElementById('pf-stat-quotes').textContent = quoted;
      document.getElementById('pf-stat-booked').textContent = booked;
      document.getElementById('pf-stat-volume').textContent = vol.toLocaleString();

      // Timeline
      var items = D.customerTimeline(c);
      var tl = document.getElementById('pf-timeline');
      tl.innerHTML = items.length ? items.slice(0, 30).map(function (it) {
        return '<div class="flex items-start gap-3 border border-border rounded p-2.5">' +
          '<span class="material-symbols-outlined text-primary text-[18px] mt-0.5">' + (TIMELINE_ICON[it.kind] || 'history') + '</span>' +
          '<div class="min-w-0 flex-1"><p class="text-sm font-semibold text-dark truncate">' + D.escapeHtml(it.label) + '</p>' +
          '<p class="text-xs text-light">' + D.fmtDate(it.date) + '</p></div>' +
          '<span class="' + D.statusPill(it.status) + ' text-[10px] font-semibold px-2 py-0.5 rounded-full whitespace-nowrap">' + D.escapeHtml(it.status) + '</span>' +
        '</div>';
      }).join('') : '<p class="text-xs text-light text-center py-3" data-i18n="cust_no_timeline">No activity recorded yet.</p>';

      document.getElementById('profile-modal').classList.remove('hidden');
      if (window.reapplyDashLang) window.reapplyDashLang();
    }
    function closeProfile() { document.getElementById('profile-modal').classList.add('hidden'); profileId = null; }
    function saveProfile() {
      if (profileId == null) return;
      D.updateCustomer(profileId, {
        name: document.getElementById('pf-name').value.trim(),
        company: document.getElementById('pf-company').value.trim(),
        email: document.getElementById('pf-email').value.trim(),
        phone: document.getElementById('pf-phone').value.trim(),
        location: document.getElementById('pf-location').value.trim(),
        segment: document.getElementById('pf-segment').value,
        representative: document.getElementById('pf-rep').value.trim(),
        keyAccount: document.getElementById('pf-key').checked,
        notes: document.getElementById('pf-notes').value.trim()
      });
      D.logAudit('customer_updated', 'Customer profile updated', profileId, document.getElementById('pf-name').value.trim());
      closeProfile();
      renderCustomers();
      var toast = document.getElementById('rec-toast');
      toast.textContent = window.dashT ? window.dashT('toast_cust_saved', 'Customer saved') : 'Customer saved';
      toast.style.display = 'block';
      setTimeout(function () { toast.style.display = 'none'; }, 2500);
    }

    renderCustomers();
    // Re-render when fresh customer data arrives from the server.
    D.subscribe(renderCustomers);
  </script>
</body>
</html>
